services:
  postgres:
    image: postgres:17
    container_name: mall-postgres
    environment:
      POSTGRES_DB: ${MALL_PG_DB:-mall}
      POSTGRES_USER: ${MALL_PG_USER:-mall}
      POSTGRES_PASSWORD: ${MALL_PG_PASSWORD:-mall123}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:8
    container_name: mall-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  kafka:
    image: apache/kafka:4.0.1
    container_name: mall-kafka
    ports:
      - "9094:9094"
    environment:
      CLUSTER_ID: 4L6g3nShT-eMCtK--X86sw
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka-data:/var/lib/kafka/data

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: mall-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  minio:
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z
    container_name: mall-minio
    command: server /data --console-address ":9001"
    environment:
      # MinIO 管理员账号，后面后端接上传时也会用到这一组凭证。
      MINIO_ROOT_USER: ${MALL_MINIO_ROOT_USER:-mallminio}
      MINIO_ROOT_PASSWORD: ${MALL_MINIO_ROOT_PASSWORD:-mallminio123}
    ports:
      # 9000 是对象存储 API 端口，9001 是控制台页面端口。
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  redis-data:
  kafka-data:
  minio-data:
